# ════════════════════════════════════════════════════════════════════════
# Pull-and-run compose for the WORKSTATION (no build).
# Uses images already pushed to Docker Hub. Set IMAGE_API / IMAGE_FRONTEND in
# .env (the publish.sh output prints them), then:
#     docker compose -f docker-compose.hub.yml pull
#     docker compose -f docker-compose.hub.yml up -d
#
# The pulled image carries the venv + deps only. code/ and data/ are
# bind-mounted from this repo; detector weights are mounted from HOST_MODELS_DIR.
# ════════════════════════════════════════════════════════════════════════
services:
  api:
    image: ${IMAGE_API:-CHANGEME/treecrown-workstation:latest}
    pull_policy: always
    restart: unless-stopped
    env_file: .env
    working_dir: /code
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8123:8000"
    volumes:
      - ./code:/code
      - ./data:/data
      - ${HOST_MODELS_DIR:?Set HOST_MODELS_DIR in .env to the detector weights folder}:/models:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/livez"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: ${IMAGE_FRONTEND:-CHANGEME/treecrown-frontend:latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "8200:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - api
